version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    groups: # grupperer alle endringer til én enkelt PR
      uv:
        patterns:
          - '*'

  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    groups:
      all-actions:
        patterns: [ "*" ]
